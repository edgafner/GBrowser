# GitHub Actions Workflow for launching UI tests on macOS.
# Uses IntelliJ IDE Starter with Remote Driver for automated UI interaction.
#
# Workflow is triggered manually, on push to main, or on PRs.

name: Run UI Tests
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ui-tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  testUI:
    permissions:
      contents: write
      checks: write
      pull-requests: write
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    name: Test GBrowser UI on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest

    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup JBR 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'jetbrains'
          java-version: 25
          java-package: 'jdk+jcef'
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Grant screen recording permissions for macOS UI tests
      # On macOS 14+ (Sonoma), the replayd plist approach no longer works.
      # We must modify the TCC database directly to pre-grant ScreenCapture
      # permission to bash/terminal, preventing the blocking modal dialog.
      - name: Grant macOS Screen Recording Permissions
        if: runner.os == 'macOS'
        run: |
          # Determine the macOS major version
          MACOS_VERSION=$(sw_vers -productVersion | cut -d. -f1)
          echo "macOS major version: $MACOS_VERSION"

          # Reset any existing screen capture decisions for bash and java
          tccutil reset ScreenCapture 2>/dev/null || true

          # Pre-grant screen recording permission via TCC database
          # This is the only reliable approach on macOS 14+ GitHub runners
          TCC_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          if [ -f "$TCC_DB" ]; then
            # Grant to bash (which launches Gradle/JVM)
            sqlite3 "$TCC_DB" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceScreenCapture', '/bin/bash', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true
            sqlite3 "$TCC_DB" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, indirect_object_identifier_type, flags) VALUES ('kTCCServiceScreenCapture', '/bin/zsh', 1, 2, 0, 1, 0, 0);" 2>/dev/null || true
            echo "TCC database updated for screen capture permissions"
          else
            echo "TCC database not found at expected path, trying alternative approaches..."
          fi

          # Also set the legacy replayd plist as fallback for older macOS
          mkdir -p ~/Library/"Group Containers"/group.com.apple.replayd
          defaults write ~/Library/"Group Containers"/group.com.apple.replayd/ScreenCaptureApprovals.plist \
            "com.jetbrains.intellij" -date "3024-01-01 00:00:00 +0000" || true

          # Disable macOS screen capture notifications that can block UI
          defaults write com.apple.screencaptureui "NSStatusItem Visible Item-0" -int 0 2>/dev/null || true

          echo "Screen recording permissions configured"

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/transforms
            caches/transforms-*

      # Run tests
      - name: Tests
        run: ./gradlew uiTest --no-scan --info --stacktrace
        env:
          IDE_STARTER_DEBUG: true

      # Only upload artifacts on failure for debugging
      - name: Collect Debug Artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: tests-result-${{ matrix.os }}
          path: |
            ${{ github.workspace }}/build/out/ide-tests/tests/**/*/log/
            ${{ github.workspace }}/build/out/ide-tests/tests/**/*/reports/
            ${{ github.workspace }}/build/out/ide-tests/tests/**/*/snapshots/
            ${{ github.workspace }}/build/reports/tests/
          if-no-files-found: warn
        continue-on-error: true
