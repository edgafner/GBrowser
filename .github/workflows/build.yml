# GitHub Actions Workflow is created for testing and preparing the plugin release in the following steps:
# - Validate Gradle Wrapper.
# - Run 'test' and 'verifyPlugin' tasks.
# - Run Qodana inspections.
# - Run the 'buildPlugin' task and prepare artifact for further tests.
# - Run the 'runPluginVerifier' task.
# - Create a draft release.
#
# The workflow is triggered on push and pull_request events.
#
# GitHub Actions reference: https://help.github.com/en/actions
#
##

name: Build
on:
  # Trigger the workflow on pushes to only the 'main' branch (this avoids duplicate checks being run e.g., for dependabot pull requests)
  push:
    branches: [ main ]
  # Trigger the workflow on any pull request
  pull_request:

concurrency:
  group: build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  # Prepare the environment and build the plugin
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      is_changelog_pr: ${{ steps.check_changelog.outputs.is_changelog }}
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Check if this is a changelog-only PR
      - name: Check if changelog PR
        id: check_changelog
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ contains(github.event.pull_request.labels.*.name, 'release changelog') }}" == "true" ]]; then
            echo "is_changelog=true" >> $GITHUB_OUTPUT
            echo "This is a changelog-only PR, will skip expensive steps"
          else
            echo "is_changelog=false" >> $GITHUB_OUTPUT
          fi

      # Validate wrapper
      - name: Gradle Wrapper Validation
        if: steps.check_changelog.outputs.is_changelog != 'true'
        uses: gradle/actions/wrapper-validation@v6

      # Set up the Java environment for the next steps
      - name: Setup JBR 25
        if: steps.check_changelog.outputs.is_changelog != 'true'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'jetbrains'
          java-version: 25
          java-package: 'jdk+jcef'
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Gradle — only the build job on main writes cache; PRs read-only
      - name: Setup Gradle
        if: steps.check_changelog.outputs.is_changelog != 'true'
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/transforms
            caches/transforms-*

      # Build plugin and resolve unit-test dependencies so they get cached
      - name: Build plugin
        if: steps.check_changelog.outputs.is_changelog != 'true'
        run: ./gradlew buildPlugin compileTestKotlin --no-scan

      # Skip build for changelog PRs
      - name: Skip build for changelog PR
        if: steps.check_changelog.outputs.is_changelog == 'true'
        run: |
          echo "Skipping build for changelog-only PR"
          mkdir -p ${{ github.workspace }}/build/distributions
          echo "dummy" > ${{ github.workspace }}/build/distributions/dummy.txt

      # Prepare plugin archive content for creating artifact
      - name: Prepare Plugin Artifact
        if: steps.check_changelog.outputs.is_changelog != 'true'
        id: artifact
        shell: bash
        run: |
          cd ${{ github.workspace }}/build/distributions
          FILENAME=`ls *.zip`
          unzip "$FILENAME" -d content

          echo "filename=${FILENAME:0:-4}" >> $GITHUB_OUTPUT

      # Store the already-built plugin as an artifact for downloading
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ steps.artifact.outputs.filename }}
          path: ./build/distributions/content/*/*

  # Run tests and upload a code coverage report
  test:
    name: Test
    if: needs.build.outputs.is_changelog_pr != 'true'
    needs: [ build ]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # Set up the Java environment for the next steps
      - name: Setup JBR 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'jetbrains'
          java-version: 25
          java-package: 'jdk+jcef'
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Gradle — read-only cache (build job writes on main)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/transforms
            caches/transforms-*

      # Free up disk space — lightweight cleanup
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: true
          swap-storage: false

      # Run tests
      - name: Run Tests
        run: ./gradlew check -x uiTest --no-scan

      # Collect Tests Result of failed tests
      - name: Collect Tests Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.0
        with:
          name: tests-result
          path: ${{ github.workspace }}/build/reports/tests

      # Collect Tests Result of failed tests
      - name: Collect Tests Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.0
        with:
          name: tests-report
          path: ${{ github.workspace }}/build/test-results/test/*.xml

      # Upload the Kover report to CodeCov
      - name: Upload Code Coverage Report
        uses: codecov/codecov-action@v6.0.0
        with:
          files: ${{ github.workspace }}/build/reports/kover/report.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS

  # Run Qodana inspections and provide the report
  inspectCode:
    name: Inspect code
    if: needs.build.outputs.is_changelog_pr != 'true'
    needs: [ build ]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    permissions:
      contents: write
      checks: write
      pull-requests: write
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # Set up the Java environment for the next steps
      - name: Setup JBR 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'jetbrains'
          java-version: 25
          java-package: 'jdk+jcef'
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Gradle — read-only cache (build job writes on main)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/transforms
            caches/transforms-*

      # Free up disk space — lightweight cleanup
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: true
          swap-storage: false

      # Run Qodana inspections — stable cache key so main reuses its cache
      - name: Qodana - Code Inspection
        uses: JetBrains/qodana-action@v2025.3.2
        with:
          primary-cache-key: qodana-2025.3-${{ github.ref_name }}
          cache-default-branch-only: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_SHOW_REPORT: true

  # Run plugin structure verification along with IntelliJ Plugin Verifier
  verify:
    name: Verify plugin
    if: needs.build.outputs.is_changelog_pr != 'true'
    needs: [ build ]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      checks: write
      pull-requests: write
      actions: read
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup JBR 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'jetbrains'
          java-version: 25
          java-package: 'jdk+jcef'
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Gradle — read-only cache (build job writes on main)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/transforms
            caches/transforms-*

      # Free up disk space before running plugin verifier (downloads multiple IDE versions)
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # Run Verify Plugin task and IntelliJ Plugin Verifier tool
      - name: Run Plugin Verification tasks
        run: ./gradlew verifyPlugin --no-scan

      # Collect Plugin Verifier Result
      - name: Collect Plugin Verifier Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.0
        with:
          name: pluginVerifier-result
          path: ${{ github.workspace }}/build/reports/pluginVerifier

  # Test report step
  test-report:
    name: Test Report
    if: "!cancelled() && (needs.test.result == 'success' || needs.test.result == 'failure')"
    needs: [ build, test ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write
      actions: read
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        id: download
        with:
          name: tests-report
          path: ~/

      - name: Generate Test Report
        uses: dorny/test-reporter@v3.0.0
        if: success() || failure()
        with:
          name: Test Report Dashboard
          reporter: java-junit
          fail-on-error: 'true'
          path: '${{steps.download.outputs.download-path}}/*.xml'

  # Prepare a draft release for GitHub Releases page for the manual verification
  # When accepted and published, the release workflow would be triggered
  releaseDraft:
    name: Release draft
    if: github.event_name != 'pull_request' && !cancelled() && needs.build.result == 'success' && needs.test.result == 'success' && needs.verify.result == 'success'
    needs: [ build, test, test-report, inspectCode, verify ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up the Java environment for the next steps
      - name: Setup JBR 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'jetbrains'
          java-version: 25
          java-package: 'jdk+jcef'
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Gradle — read-only cache (build job writes on main)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
          gradle-home-cache-excludes: |
            caches/build-cache-*
            caches/*/transforms
            caches/transforms-*

      # Remove old release drafts
      - name: Remove Old Release Drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/{owner}/{repo}/releases \
            --jq '.[] | select(.draft == true) | .id' \
            | xargs -I '{}' gh api -X DELETE repos/{owner}/{repo}/releases/{}

      # Create a new release draft
      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(./gradlew properties --property version --quiet --console=plain --no-scan | tail -n 1 | cut -f2- -d ' ')
          RELEASE_NOTE="./build/tmp/release_note.txt"
          ./gradlew getChangelog --unreleased --no-header --quiet --console=plain --no-scan --output-file=$RELEASE_NOTE

          gh release create $VERSION \
            --draft \
            --title $VERSION \
            --notes-file $RELEASE_NOTE
