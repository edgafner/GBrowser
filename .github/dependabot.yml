version: 2
updates:
  # Gradle (main plugin) — split majors to isolate IntelliJ Platform breaking changes
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gradle-minor-patch:
        patterns: [ "*" ]
        update-types: [ "minor", "patch" ]
      gradle-major:
        patterns: [ "*" ]
        update-types: [ "major" ]

  # GitHub Actions — bundle everything (low blast radius, safe to group majors)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: [ "*" ]